services:
  - type: web
    name: lms-fastapi-backend
    env: python
    plan: free
    rootDir: fastapi_backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.3
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
